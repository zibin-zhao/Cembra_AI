name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate toy data
        run: python scripts/generate_toy_data.py --output-dir data/toy --n-snps 200 --n-samples 100

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short -x

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short -x -k "not gpu"

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        run: |
          pip install pytest-cov
          pytest tests/ -v --cov=oa_prs --cov-report=xml -k "not gpu"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  gpu-tests:
    runs-on: ubuntu-latest
    if: false  # Enable when GPU runners are available
    steps:
      - uses: actions/checkout@v4
      - name: GPU tests placeholder
        run: echo "GPU tests require NVIDIA runners"
